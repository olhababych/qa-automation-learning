[pytest]
addopts = --slowmo=500 --reruns=2 --reruns-delay=3 --html=reports/report.html --self-contained-html
markers =
    smoke: Базові sanity-перевірки UI
    positions: Тести відкриття/закриття позицій
    limit_orders: Тести Limit ордерів
    reduce_only: Тести Reduce Only функціональності
    deposit_withdraw: Тести модалок Deposit і Withdraw
    leverage: Тести зміни leverage
    liquidation: Тести ліквідаційної ціни (наразі skip — бекенд не рахує на dev)
    negative: Негативні сценарії
    btc: Тести на BTC/USDC ринку
    sol: Тести на SOL/USDC ринку
    slow: Повільні інтеграційні тести (реальне спрацювання TP/SL за живим ринком). Виключати з основного прогону: -m "not slow"
